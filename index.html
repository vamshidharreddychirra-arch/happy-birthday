<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday! ❤️</title>

    <meta property="og:title" content="🎉 Happy Birthday! 🎉" />
    <meta property="og:description" content="I made a little surprise just for you. Tap to open! 🎁✨" />
    <meta property="og:image" content="giftbox.png" />
    <meta property="og:type" content="website" />

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background: linear-gradient(135deg, #fef2f2 0%, #ffe4e6 50%, #fce7f3 100%);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* --- BACKGROUND FLOATING DECORATIONS --- */
        .decor {
            position: absolute;
            pointer-events: none;
            opacity: 0.85;
            animation: floatUpDown 5s ease-in-out infinite;
            mix-blend-mode: multiply; 
            background: transparent !important;
        }

        #decor-1 { top: 5%; left: 4%; width: 75px; }
        #decor-2 { top: 8%; right: 4%; width: 85px; animation-delay: 1.5s; }
        #decor-3 { bottom: 6%; left: 4%; width: 70px; animation-delay: 3s; }
        #decor-4 { bottom: 5%; right: 4%; width: 80px; animation-delay: 2.2s; }
        
        @keyframes floatUpDown {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-12px) scale(1.03); }
        }

        /* --- SCREEN CONTAINER --- */
        .container {
            width: 100%;
            max-width: 420px;
            padding: 25px;
            text-align: center;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* --- SCREEN 1: THE GIFT BOX --- */
        #gift-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.8s ease;
            width: 100%;
            padding: 0 10px; 
        }

        h1 {
            color: #ec4899;
            font-size: 2.6rem;
            line-height: 1.2;
            margin-bottom: 10px;
            font-weight: 800;
            animation: textGlow 2.5s infinite ease-in-out;
        }
        h1 span { color: #d97706; }

        @keyframes textGlow {
            0%, 100% { text-shadow: 0 0 12px rgba(236,72,153,0.3); transform: scale(1); }
            50% { text-shadow: 0 0 25px rgba(236,72,153,0.6); transform: scale(1.02); }
        }

        .subtitle {
            font-size: 1.1rem;
            color: #be185d;
            font-weight: 600;
            margin-bottom: 30px;
        }

        /* --- GIFT BOX ROW & SIDE EMOJIS --- */
        .gift-row-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin: 15px 0;
            position: relative;
        }

        .side-emoji {
            font-size: 2rem;
            user-select: none;
            pointer-events: none;
        }

        .left-emoji {
            animation: floatLeftEmoji 1.5s infinite ease-in-out alternate;
        }

        .right-emoji {
            animation: floatRightEmoji 1.5s infinite ease-in-out alternate;
            animation-delay: 0.3s;
        }

        @keyframes floatLeftEmoji {
            0% { transform: translateY(0) rotate(-10deg) scale(1); }
            100% { transform: translateY(-10px) rotate(5deg) scale(0.5); }
        }

        @keyframes floatRightEmoji {
            0% { transform: translateY(0) rotate(10deg) scale(1); }
            100% { transform: translateY(-10px) rotate(-5deg) scale(0.5); }
        }

        /* Gift Box 3D Wrapper */
        .gift-wrapper {
            position: relative;
            width: 170px;
            height: 170px;
            margin: 15px 0;
            cursor: pointer;
            animation: dynamicBox 1.2s infinite ease-in-out;
        }
        .gift-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            mix-blend-mode: multiply; 
            background: transparent !important;
        }

        @keyframes dynamicBox {
            0%, 100% { transform: translateY(0) scale(1) rotate(0deg); }
            20% { transform: translateY(-12px) scale(1.05) rotate(-5deg); }
            40% { transform: translateY(0) scale(0.95) rotate(5deg); }
            60% { transform: translateY(-6px) scale(1.02) rotate(-3deg); }
            80% { transform: translateY(0) scale(0.98) rotate(3deg); }
        }

        /* Shrunk text animation underneath */
        .tap-prompt {
            margin-top: 35px;
            font-size: 1rem;
            color: #ea580c;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        /* The "Pop" animation triggered on click */
        .pop-effect {
            animation: giftPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.5) forwards !important;
        }

        @keyframes giftPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.4) rotate(-10deg); }
            100% { transform: scale(0) rotate(10deg); opacity: 0; }
        }

        /* Makes the side emojis fly away when the box pops */
        .emoji-fly-left {
            transition: all 0.4s ease-out;
            transform: translateX(-150px) scale(0) rotate(-45deg);
            opacity: 0;
        }
        .emoji-fly-right {
            transition: all 0.4s ease-out;
            transform: translateX(150px) scale(0) rotate(45deg);
            opacity: 0;
        }

        /* Confetti Overlay */
        #confetti {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 999;
        }
    </style>
</head>
<body>

    <audio id="bg-audio" src="music.mp3" loop></audio>
    <canvas id="confetti"></canvas>

    <img src="heart1.jpg" id="decor-1" class="decor" alt="❤️">
    <img src="balloon.png" id="decor-2" class="decor" alt="🎈">
    <img src="balloon2.jpg" id="decor-3" class="decor" alt="🎈">
    <img src="heart2.png" id="decor-4" class="decor" alt="❤️">

    <div class="container">
        <div id="gift-screen">
            <h1>Happy Birthday,<br><span>Friend!</span> 🥰✨</h1>
            <p class="subtitle">I made a little something for you. ❤️</p>
            
            <div class="gift-row-container">
                <span class="side-emoji left-emoji">💖</span>
                
                <div class="gift-wrapper" onclick="openSurprise()">
                    <img src="giftcard.png" alt="🎁">
                </div>
                
                <span class="side-emoji right-emoji">✨</span>
            </div>
            
            <p class="tap-prompt">(Tap to open me! 🧸✨)</p>
        </div>
    </div>

    <script>
        function openSurprise() {
            const giftWrapper = document.querySelector('.gift-wrapper');
            const leftEmoji = document.querySelector('.left-emoji');
            const rightEmoji = document.querySelector('.right-emoji');
            const audio = document.getElementById('bg-audio');

            audio.play().catch(() => console.log("Audio waiting for user clearance."));

            giftWrapper.classList.add('pop-effect');
            if(leftEmoji) leftEmoji.classList.add('emoji-fly-left');
            if(rightEmoji) rightEmoji.classList.add('emoji-fly-right');
            
            burstConfetti();
        }

        // Engine behind full screen premium confetti explosion
        function burstConfetti() {
            const canvas = document.getElementById('confetti');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            let particles = [];
            const hues = ['#ec4899', '#f43f5e', '#e11d48', '#fbbf24', '#38bdf8'];

            for (let i = 0; i < 120; i++) {
                particles.push({
                    x: canvas.width / 2,
                    y: canvas.height / 2,
                    size: Math.random() * 6 + 4,
                    color: hues[Math.floor(Math.random() * hues.length)],
                    speedX: (Math.random() - 0.5) * 12,
                    speedY: (Math.random() - 0.7) * 15,
                    gravity: 0.35
                });
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach((p, idx) => {
                    p.speedY += p.gravity;
                    p.x += p.speedX;
                    p.y += p.speedY;
                    
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fillStyle = p.color;
                    ctx.fill();

                    if (p.y > canvas.height) particles.splice(idx, 1);
                });

                if (particles.length > 0) requestAnimationFrame(animate);
            }
            animate();
        }
    </script>
</body>
</html>
