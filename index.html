<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday! ❤️</title>

    <meta property="og:title" content="🎉 Happy Birthday! 🎉" />
    <meta property="og:description" content="I made a little surprise just for you. Tap to open! 🎁✨" />
    <meta property="og:image" content="giftbox.png" />
    <meta property="og:type" content="website" />

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background: linear-gradient(135deg, #fef2f2 0%, #ffe4e6 50%, #fce7f3 100%);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* --- BACKGROUND FLOATING DECORATIONS --- */
        /* --- BACKGROUND FLOATING DECORATIONS --- */
        .decor {
            position: absolute;
            pointer-events: none;
            opacity: 0.85; /* Makes them clear and beautiful */
            animation: floatUpDown 5s ease-in-out infinite;
            
            /* CRITICAL FIX: This removes the white backgrounds from your JPGs/PNGs */
            mix-blend-mode: multiply; 
            background: transparent !important;
        }

        /* Top Left Corner - Moved safely outside the title text */
        #decor-1 { 
            top: 5%; 
            left: 4%; 
            width: 75px; 
        }

        /* Top Right Corner - Moved out of the way of the title text */
        #decor-2 { 
            top: 8%; 
            right: 4%; 
            width: 85px; 
            animation-delay: 1.5s; 
        }

        /* Bottom Left Corner - Positioned away from the tap prompt */
        #decor-3 { 
            bottom: 6%; 
            left: 4%; 
            width: 70px; 
            animation-delay: 3s; 
        }

        /* Bottom Right Corner - Positioned away from the tap prompt */
        #decor-4 { 
            bottom: 5%; 
            right: 4%; 
            width: 80px; 
            animation-delay: 2.2s; 
        }
        
        @keyframes floatUpDown {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-12px) scale(1.03); }
        }

        /* --- SCREEN CONTAINER --- */
        .container {
            width: 100%;
            max-width: 420px;
            padding: 25px;
            text-align: center;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* --- SCREEN 1: THE GIFT BOX --- */
        #gift-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.8s ease;
            width: 100%;
            /* Ensures centered content stays strictly bounded inside phone */
            padding: 0 10px; 
        }

        h1 {
            color: #ec4899;
            font-size: 2.6rem; /* Marginally scaled down to prevent text-crowding on small displays */
            line-height: 1.2;
            margin-bottom: 10px;
            font-weight: 800;
            animation: textGlow 2.5s infinite ease-in-out;
        }
        h1 span { color: #d97706; }

        @keyframes textGlow {
            0%, 100% { text-shadow: 0 0 12px rgba(236,72,153,0.3); transform: scale(1); }
            50% { text-shadow: 0 0 25px rgba(236,72,153,0.6); transform: scale(1.02); }
        }

        .subtitle {
            font-size: 1.1rem;
            color: #be185d;
            font-weight: 600;
            margin-bottom: 30px;
        }

        /* Gift Box 3D Wrapper */
        .gift-wrapper {
            position: relative;
            width: 170px;
            height: 170px;
            margin: 15px 0;
            cursor: pointer;
            animation: dynamicBox 1.2s infinite ease-in-out;
        }
        .gift-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            /* CRITICAL FIX: Removes the white square background around your gift box */
            mix-blend-mode: multiply; 
            background: transparent !important;
        }

        @keyframes dynamicBox {
            0%, 100% { transform: translateY(0) scale(1) rotate(0deg); }
            20% { transform: translateY(-12px) scale(1.05) rotate(-5deg); }
            40% { transform: translateY(0) scale(0.95) rotate(5deg); }
            60% { transform: translateY(-6px) scale(1.02) rotate(-3deg); }
            80% { transform: translateY(0) scale(0.98) rotate(3deg); }
        }

        /* Shrunk text animation underneath */
        .tap-prompt {
            margin-top: 35px;
            font-size: 1rem;
            color: #ea580c;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        /* --- SCREEN 2: STORY TIMELINE --- */
        #story-screen {
            display: none; /* Triggered on click */
            width: 100%;
            flex-direction: column;
            align-items: center;
        }

        .slide {
            display: none;
            width: 100%;
            flex-direction: column;
            align-items: center;
            animation: slideIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        .slide.active { display: flex; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(40px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Beautiful Rounded Display for Photos */
        .photo-frame {
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 24px;
            background: white;
            padding: 10px;
            box-shadow: 0 20px 40px rgba(236,72,153,0.15);
            margin-bottom: 25px;
        }
        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 16px;
        }

        /* Universal Action Button */
        .action-btn {
            background: linear-gradient(135deg, #ec4899 0%, #db2777 100%);
            color: white;
            border: none;
            padding: 14px 35px;
            font-size: 1.05rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(219,39,119,0.3);
            transition: all 0.2s ease;
        }
        .action-btn:active { transform: scale(0.95); }

        /* --- FINAL SLIDE CONTENT --- */
        .teddy-icon {
            font-size: 4.5rem;
            margin-bottom: 10px;
            animation: heartPulse 1.4s infinite alternate;
        }
        @keyframes heartPulse {
            to { transform: scale(1.15); }
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
            color: #4c0519;
            line-height: 1.6;
            margin-top: 15px;
            font-size: 1.05rem;
            border: 1px solid #fce7f3;
        }
        .card h3 { color: #db2777; margin-bottom: 8px; }

        /* Confetti Overlay */
        #confetti {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 999;
        }
    </style>
</head>
<body>

    <audio id="bg-audio" src="music.mp3" loop></audio>
    <canvas id="confetti"></canvas>

    <img src="heart1.jpg" id="decor-1" class="decor" alt="❤️">
    <img src="balloon.png" id="decor-2" class="decor" alt="🎈">
    <img src="balloon2.jpg" id="decor-3" class="decor" alt="🎈">
    <img src="heart2.png" id="decor-4" class="decor" alt="❤️">

    <div class="container">
        <div id="gift-screen">
            <h1>Happy Birthday,<br><span>Friend!</span> 🥰✨</h1>
            <p class="subtitle">I made a little something for you. ❤️</p>
            
            <div class="gift-wrapper" onclick="openSurprise()">
                <img src="giftcard.png" alt="🎁">
            </div>
            
            <p class="tap-prompt">(Tap to open me! 🧸✨)</p>
        </div>

        <div id="story-screen">
            
            <div class="slide active">
                <div class="photo-frame">
                    <img src="photo1.jpg" alt="Memory 1">
                </div>
                <button class="action-btn" onclick="advanceSlide()">Next Memory 👉</button>
            </div>

            <div class="slide">
                <div class="photo-frame">
                    <img src="photo2.jpg" alt="Memory 2">
                </div>
                <button class="action-btn" onclick="advanceSlide()">Next Memory 👉</button>
            </div>

            <div class="slide">
                <div class="teddy-icon">🧸❤️</div>
                <div class="photo-frame">
                    <img src="our-photo.jpg" alt="Us together">
                </div>
                <div class="card">
                    <h3>My Birthday Wish For You...</h3>
                    <p>Type your beautiful heartfelt wish or insider joke right here to wrap up the gift perfectly!</p>
                </div>
            </div>

        </div>
    </div>

    <script>
        let currentIdx = 0;
        const slides = document.querySelectorAll('.slide');

        function openSurprise() {
            // Play Audio safely
            const audio = document.getElementById('bg-audio');
            audio.play().catch(() => console.log("Audio waiting for user clearance."));
            
            // Pop Confetti Explosion
            burstConfetti();

            // Slide Screen Switch
            document.getElementById('gift-screen').style.display = 'none';
            document.getElementById('story-screen').style.display = 'flex';
        }

        function advanceSlide() {
            slides[currentIdx].classList.remove('active');
            currentIdx++;
            if (currentIdx < slides.length) {
                slides[currentIdx].classList.add('active');
            }
        }

        // Engine behind full screen premium confetti explosion
        function burstConfetti() {
            const canvas = document.getElementById('confetti');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            let particles = [];
            const hues = ['#ec4899', '#f43f5e', '#e11d48', '#fbbf24', '#38bdf8'];

            for (let i = 0; i < 120; i++) {
                particles.push({
                    x: canvas.width / 2,
                    y: canvas.height / 2,
                    size: Math.random() * 6 + 4,
                    color: hues[Math.floor(Math.random() * hues.length)],
                    speedX: (Math.random() - 0.5) * 12,
                    speedY: (Math.random() - 0.7) * 15,
                    gravity: 0.35
                });
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach((p, idx) => {
                    p.speedY += p.gravity;
                    p.x += p.speedX;
                    p.y += p.speedY;
                    
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fillStyle = p.color;
                    ctx.fill();

                    if (p.y > canvas.height) particles.splice(idx, 1);
                });

                if (particles.length > 0) requestAnimationFrame(animate);
            }
            animate();
        }
    </script>
</body>
</html>
